<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>投資模擬：誰是Elon Musk？！ (iPad 適配版)</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; margin: 0; padding: 5px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { text-align: center; padding: 8px 0; background: #1877f2; color: white; border-radius: 8px; margin-bottom: 5px; }
        .header h1 { margin: 0; font-size: 1.8rem; }
        .dashboard { flex: 1; display: grid; grid-template-columns: 1.8fr 1fr; gap: 10px; height: calc(100% - 60px); }
        .main-panel { background: white; padding: 10px; border-radius: 12px; display: flex; flex-direction: column; justify-content: space-between; }
        
        table { width: 100%; border-collapse: collapse; font-size: 1.6rem; }
        th, td { border-bottom: 2px solid #eee; padding: 15px 5px; text-align: center; transition: all 0.3s ease; }
        th { background: #f8f9fa; }
        
        .winner-row { background-color: #fff9c4 !important; } 
        .winner-row td { font-weight: bold; }
        .winner-row td.balance { color: #f57f17; }
        .trophy { margin-left: 8px; font-size: 1.4rem; }

        .balance { font-family: 'Consolas', monospace; font-weight: bold; color: #2e7d32; }
        .stats-box { background: #e7f3ff; padding: 15px; border-radius: 8px; font-size: 1.6rem; font-weight: bold; display: flex; justify-content: space-around; }
        .side-panel { display: flex; flex-direction: column; gap: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 10px 0; font-size: 1.3rem; color: #1877f2; border-bottom: 2px solid #1877f2; padding-bottom: 5px; }
        
        .group-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: repeat(3, 1fr);
            grid-auto-flow: column; 
            gap: 15px; 
        }
        
        .group-item { display: flex; align-items: center; justify-content: space-between; font-size: 1.4rem; font-weight: bold; }
        select { padding: 8px; font-size: 1.3rem; border-radius: 5px; width: 100px; }
        
        #dividend-card { display: none; background: #fff4e5; border: 2px solid #f7b928; }
        .div-btn { background: #f7b928; color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.3rem; cursor: pointer; width: 100%; transition: 0.3s; }
        .div-btn:active { transform: scale(0.9); }
        
        .btn { width: 100%; padding: 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.6rem; transition: 0.2s; }
        .btn-next { background: #1877f2; color: white; }

        .admin-trigger {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            color: #ccc;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="header">
    <h1> 🚀🚀 誰是Elon Musk？！：第 <span id="day-num">1</span> / 7 天</h1>
</div>

<div class="dashboard">
    <div class="main-panel">
        <table>
            <thead>
                <tr>
                    <th>組別</th>
                    <th>目前資產 (HKD)</th>
                    <th>選擇</th>
                    <th>本日總回報率</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>

        <div class="stats-box">
            <span>債券平均: <span id="avg-bond" style="color:#1877f2">0.00%</span></span>
            <span>股票平均: <span id="avg-share" style="color:#d32f2f">0.00%</span></span>
        </div>
    </div>

    <div class="side-panel">
        <div class="card">
            <h2>各組選擇 (1-6)</h2>
            <div class="group-grid" id="input-container"></div>
        </div>

        <div id="dividend-card" class="card">
            <h2 style="color: #e67e22; border-color: #e67e22;">公司即時決策 (隱藏獎勵)</h2>
            <button class="div-btn" onclick="applyInstantDividend()">💰 追加額外股息</button>
        </div>

        <div style="margin-top: auto;">
            <button id="main-action-btn" class="btn btn-next" onclick="nextDay()">確認選擇並結算</button>
            <button id="reset-btn" class="btn" style="background:#ccc; display:none; margin-top:10px;" onclick="location.reload()">重新開始</button>
        </div>
    </div>
</div>

<div class="admin-trigger" onclick="toggleDividendCard()">⚙️</div>

<script>
    let day = 1;
    const maxDays = 7;
    let groups = Array.from({length: 6}, (_, i) => ({ id: i+1, balance: 1000, choice: '', lastReturn: 0, currentBonus: 0 }));
    let totalBondReturn = 0;
    let totalShareReturn = 0;
    let isSettled = false;

    const shareBehavior = [0.06, -0.05, 0.08, 0.04, -0.08, 0.07, 0.09]; 

    window.addEventListener('keydown', function(e) {
        if (e.key.toLowerCase() === 'd') {
            toggleDividendCard();
        }
    });

    function toggleDividendCard() {
        if (!isSettled) return; 
        const card = document.getElementById('dividend-card');
        card.style.display = (card.style.display === 'none' || card.style.display === '') ? 'block' : 'none';
    }

    function initInputs() {
        const container = document.getElementById('input-container');
        for (let i = 1; i <= 6; i++) {
            container.innerHTML += `<div class="group-item"><label>第 ${i} 組:</label><select id="sel-${i}"><option value="B">債券</option><option value="S">股票</option></select></div>`;
        }
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        const maxBalance = Math.max(...groups.map(g => g.balance));

        groups.forEach(g => {
            let returnDisplay = '-';
            const isLeading = g.balance === maxBalance && g.balance > 1000;
            
            if (isSettled) {
                const totalPct = (g.lastReturn * 100).toFixed(2);
                returnDisplay = totalPct + '%';
                if (g.currentBonus > 0) {
                    returnDisplay += ` <small style="color:#f7b928">(+${g.currentBonus}% 股息)</small>`;
                }
            }
            
            tbody.innerHTML += `
                <tr class="${isLeading ? 'winner-row' : ''}">
                    <td><strong>第 ${g.id} 組</strong>${isLeading ? '<span class="trophy">🏆</span>' : ''}</td>
                    <td class="balance">$${g.balance.toFixed(2)}</td>
                    <td>${isSettled ? (g.choice === 'B' ? '債券' : '股票') : '-'}</td>
                    <td style="color:${g.lastReturn >= 0 ? '#d32f2f' : '#2e7d32'}">${returnDisplay}</td>
                </tr>`;
        });
    }

    function applyInstantDividend() {
        groups.forEach(g => {
            if (g.choice === 'S') {
                const oldReturn = g.lastReturn;
                g.currentBonus += 2; // 固定為 2%
                g.lastReturn += 0.02; // 固定增加 0.02
                g.balance = (g.balance / (1 + oldReturn)) * (1 + g.lastReturn);
            }
        });
        totalShareReturn += 0.02;
        document.getElementById('avg-share').innerText = (totalShareReturn / day * 100).toFixed(2) + "%";
        renderTable();
    }

    function nextDay() {
        if (!isSettled) {
            isSettled = true;
            const bondBase = (Math.random() * (0.032 - 0.028) + 0.028);
            const noise = (Math.random() * 0.01) - 0.005;
            const shareBase = shareBehavior[day-1] + noise;

            groups.forEach(g => {
                g.choice = document.getElementById(`sel-${g.id}`).value;
                g.currentBonus = 0;
                g.lastReturn = (g.choice === 'B') ? bondBase : shareBase;
                g.balance = g.balance * (1 + g.lastReturn);
            });

            totalBondReturn += bondBase;
            totalShareReturn += shareBase;

            document.getElementById('avg-bond').innerText = (totalBondReturn / day * 100).toFixed(2) + "%";
            document.getElementById('avg-share').innerText = (totalShareReturn / day * 100).toFixed(2) + "%";
            
            renderTable();

            document.getElementById('main-action-btn').innerText = "進入下一天 →";
            document.getElementById('main-action-btn').style.background = "#28a745";
        } else {
            if (day === maxDays) {
                document.getElementById('main-action-btn').style.display = 'none';
                document.getElementById('dividend-card').style.display = 'none';
                document.getElementById('reset-btn').style.display = 'block';
                document.querySelector('.header').style.background = '#2e7d32';
                document.querySelector('.header h1').innerText = "最終結算：誰是 Elon Musk？！";
                renderTable();
            } else {
                day++;
                isSettled = false;
                document.getElementById('day-num').innerText = day;
                document.getElementById('dividend-card').style.display = 'none';
                document.getElementById('main-action-btn').innerText = "確認選擇並結算";
                document.getElementById('main-action-btn').style.background = "#1877f2";
                renderTable();
            }
        }
    }

    initInputs();
    renderTable();
</script>
</body>
</html>
